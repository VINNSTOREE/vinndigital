<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle, #1e3a8a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* CONTAINER */
.container {
  width: 340px;
  padding: 25px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

h2 {
  margin-bottom: 10px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin: 10px 0;
  text-align: center;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* BUTTON GRID */
.buttons {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 6px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #2563eb;
  transform: scale(1.05);
}

/* PAY BUTTON */
.pay {
  margin-top: 10px;
  background: linear-gradient(90deg, #2563eb, #3b82f6);
  font-weight: bold;
}

/* LOADING MEWAH */
.loading {
  display: none;
  margin-top: 20px;
}

.spinner {
  width: 45px;
  height: 45px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* TEXT LOADING */
.loading-text {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%,100%{opacity:0.3}
  50%{opacity:1}
}

/* QR */
.qr {
  display: none;
  margin-top: 20px;
  animation: zoomIn 0.5s ease;
}

@keyframes zoomIn {
  from {transform: scale(0.7); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

.qr img {
  width: 200px;
  border-radius: 10px;
}

.timer {
  color: #facc15;
}

/* SUCCESS */
.success {
  display: none;
  margin-top: 20px;
  font-size: 18px;
  color: #22c55e;
  animation: pop 0.5s ease;
}

@keyframes pop {
  from {transform: scale(0.5); opacity:0;}
  to {transform: scale(1); opacity:1;}
}
</style>
</head>

<body>

<div class="container">
  <h2>💳 VINN PAYMENT</h2>

  <input type="number" id="nominal" placeholder="Masukkan nominal">

  <div class="buttons">
    <button onclick="setNom(1000)">1K</button>
    <button onclick="setNom(5000)">5K</button>
    <button onclick="setNom(10000)">10K</button>
    <button onclick="setNom(20000)">20K</button>
    <button onclick="setNom(50000)">50K</button>
    <button onclick="setNom(100000)">100K</button>
  </div>

  <button class="pay" onclick="bayar()">Bayar Sekarang</button>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Menghubungkan...</div>
  </div>

  <!-- QR -->
  <div class="qr" id="qr">
    <img id="qrImage">
    <p id="trxId"></p>
    <div class="timer" id="timer"></div>
  </div>

  <!-- SUCCESS -->
  <div class="success" id="success">
    🎉 Pembayaran Berhasil!
  </div>
</div>

<script>
function setNom(n){
  document.getElementById("nominal").value = n;
}

async function bayar(){
  const nominal = document.getElementById("nominal").value;
  if(!nominal) return alert("Isi nominal!");

  const loading = document.getElementById("loading");
  const text = document.getElementById("loadingText");

  loading.style.display = "block";

  // animasi text berubah
  setTimeout(()=> text.innerText = "Memproses pembayaran...", 1000);
  setTimeout(()=> text.innerText = "Membuat QRIS...", 2000);

  const res = await fetch("/api/create", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ amount: Number(nominal) })
  });

  const data = await res.json();
  loading.style.display = "none";

  if(!data.success) return alert("Gagal buat QR");

  document.getElementById("qr").style.display = "block";
  document.getElementById("qrImage").src = data.data.qrImage;
  document.getElementById("trxId").innerText = "ID: " + data.data.depositId;

  startTimer(300);
  cekStatus(data.data.depositId);
}

function startTimer(time){
  const el = document.getElementById("timer");

  const i = setInterval(() => {
    let m = Math.floor(time/60);
    let s = time%60;

    el.innerText = `⏳ ${m}:${s<10?'0':''}${s}`;
    time--;

    if(time < 0){
      clearInterval(i);
      el.innerText = "Expired";
    }
  },1000);
}

function cekStatus(id){
  const i = setInterval(async () => {
    const res = await fetch(`/api/status?id=${id}`);
    const data = await res.json();

    if(data?.data?.status === "success"){
      clearInterval(i);
      document.getElementById("qr").style.display = "none";
      document.getElementById("success").style.display = "block";
    }

  },15000);
}
</script>

</body>
</html>
