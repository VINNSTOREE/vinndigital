<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #1e3a8a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.container {
  width: 340px;
  padding: 25px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  text-align: center;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-bottom: 12px;
  text-align: center;
  font-size: 16px;
  background: rgba(255,255,255,0.08);
  color: white;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.buttons button {
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.buttons button:hover {
  background: #2563eb;
  transform: scale(1.05);
}

.pay {
  margin-top: 15px;
  padding: 13px;
  width: 100%;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #2563eb, #3b82f6);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.pay:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #3b82f6;
}

.loading {
  display: none;
  margin-top: 20px;
}

.spinner {
  border: 4px solid rgba(255,255,255,0.1);
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.qr {
  display: none;
  margin-top: 20px;
  animation: zoomIn 0.5s ease;
}

@keyframes zoomIn {
  from {transform: scale(0.7); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

.qr img {
  width: 200px;
  border-radius: 10px;
}

.timer {
  margin-top: 10px;
  color: #facc15;
  font-size: 14px;
}

.success {
  display: none;
  margin-top: 20px;
  font-size: 18px;
  color: #22c55e;
  animation: fadeIn 0.5s ease;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">💳 VINN PAYMENT</div>
  <div class="subtitle">Deposit cepat & otomatis</div>

  <input type="number" id="nominal" placeholder="Masukkan nominal">

  <div class="buttons">
    <button onclick="setNom(1000)">1K</button>
    <button onclick="setNom(5000)">5K</button>
    <button onclick="setNom(10000)">10K</button>
    <button onclick="setNom(15000)">15K</button>
    <button onclick="setNom(20000)">20K</button>
    <button onclick="setNom(50000)">50K</button>
  </div>

  <button class="pay" onclick="bayar()">Bayar Sekarang →</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Memproses pembayaran...</p>
  </div>

  <div class="qr" id="qr">
    <img id="qrImage">
    <p id="trxId"></p>
    <div class="timer" id="timer"></div>
  </div>

  <div class="success" id="success">
    🎉 Pembayaran Berhasil!
  </div>
</div>

<script>
const API_KEY = "rg_92de2603ed65af6487074222c8757a";

function setNom(val){
  document.getElementById("nominal").value = val;
}

async function bayar(){
  const nominal = document.getElementById("nominal").value;
  if(!nominal) return alert("Masukkan nominal!");

  document.getElementById("loading").style.display = "block";

  const res = await fetch("https://ramashop.my.id/api/public/deposit/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-API-Key": API_KEY
    },
    body: JSON.stringify({ amount: Number(nominal) })
  });

  const data = await res.json();

  document.getElementById("loading").style.display = "none";

  if(!data.success) return alert("Gagal");

  document.getElementById("qr").style.display = "block";
  document.getElementById("qrImage").src = data.data.qrImage;
  document.getElementById("trxId").innerText = "ID: " + data.data.depositId;

  startTimer(300);
  cekStatus(data.data.depositId);
}

function startTimer(duration){
  let time = duration;
  const el = document.getElementById("timer");

  const interval = setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;
    el.innerText = `⏳ Expired ${m}:${s < 10 ? '0' : ''}${s}`;

    time--;

    if(time < 0){
      clearInterval(interval);
      el.innerText = "❌ QR Expired";
    }
  }, 1000);
}

function cekStatus(id){
  const interval = setInterval(async () => {
    const res = await fetch(`https://ramashop.my.id/api/public/deposit/status/${id}`, {
      headers: { "X-API-Key": API_KEY }
    });

    const data = await res.json();
    if(data?.data?.status === "success"){
      clearInterval(interval);

      document.getElementById("qr").style.display = "none";
      document.getElementById("success").style.display = "block";
    }

  }, 15000);
}
</script>

</body>
</html>
