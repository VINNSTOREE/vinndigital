<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN GATEWAY 🔥</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* CARD */
.card{
  width:340px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,0,0,0.7);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  box-shadow:0 0 60px rgba(59,130,246,0.5);
}

/* TITLE */
h2{
  margin-bottom:10px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#2563eb);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* SWITCH */
.switch{
  margin-top:10px;
  font-size:13px;
  cursor:pointer;
  color:#60a5fa;
}

/* LOADING */
.loading{
  display:none;
  margin-top:10px;
}

.spinner{
  border:3px solid rgba(255,255,255,0.2);
  border-top:3px solid #3b82f6;
  border-radius:50%;
  width:25px;
  height:25px;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* NOTIF */
.notif{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  display:none;
  font-weight:bold;
  animation:fade 0.3s;
}

.success{
  background:#16a34a;
}

.error{
  background:#dc2626;
}

/* SHAKE */
.shake{
  animation:shake 0.3s;
}

@keyframes shake{
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
}

/* ANIM */
.fade{
  animation:fade 0.3s;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="card" id="card">
  <h2 id="title">💎 LOGIN</h2>

  <!-- LOGIN -->
  <div id="loginForm">
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="switch" onclick="showRegister()">Belum punya akun? Daftar</div>
  </div>

  <!-- REGISTER -->
  <div id="registerForm" style="display:none;">
    <input id="emailReg" placeholder="Email">
    <input id="passReg" type="password" placeholder="Password">
    <button onclick="register()">Daftar</button>
    <div class="switch" onclick="showLogin()">Sudah punya akun? Login</div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Memproses...</p>
  </div>

  <div id="notif" class="notif"></div>
</div>

<script>
const loading = document.getElementById("loading");
const notif = document.getElementById("notif");
const card = document.getElementById("card");

const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const title = document.getElementById("title");

// SWITCH FORM (FIX TOTAL)
function showRegister(){
  title.innerText="💎 REGISTER";
  loginForm.style.display="none";
  registerForm.style.display="block";
  registerForm.classList.add("fade");
}

function showLogin(){
  title.innerText="💎 LOGIN";
  registerForm.style.display="none";
  loginForm.style.display="block";
  loginForm.classList.add("fade");
}

// LOGIN
async function login(){
  loading.style.display="block";
  notif.style.display="none";

  try{
    const res = await fetch("/api/auth/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        email:email.value,
        password:pass.value
      })
    });

    const data = await res.json();
    loading.style.display="none";

    if(data.success){
      notif.innerText="✅ Login berhasil";
      notif.className="notif success";
      notif.style.display="block";

      localStorage.setItem("token",data.token);

      setTimeout(()=>location.href="/dashboard.html",800);
    }else{
      notif.innerText="❌ "+data.message;
      notif.className="notif error";
      notif.style.display="block";
      card.classList.add("shake");
      setTimeout(()=>card.classList.remove("shake"),300);
    }

  }catch(err){
    loading.style.display="none";
    notif.innerText="❌ Server error";
    notif.className="notif error";
    notif.style.display="block";
    card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),300);
  }
}

// REGISTER
async function register(){
  loading.style.display="block";
  notif.style.display="none";

  try{
    const res = await fetch("/api/auth/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        email:emailReg.value,
        password:passReg.value
      })
    });

    const data = await res.json();
    loading.style.display="none";

    if(data.success){
      notif.innerText="✅ Berhasil daftar, silakan login";
      notif.className="notif success";
      notif.style.display="block";
      showLogin();
    }else{
      notif.innerText="❌ "+data.message;
      notif.className="notif error";
      notif.style.display="block";
      card.classList.add("shake");
      setTimeout(()=>card.classList.remove("shake"),300);
    }

  }catch(err){
    loading.style.display="none";
    notif.innerText="❌ Server error";
    notif.className="notif error";
    notif.style.display="block";
    card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),300);
  }
}
</script>

</body>
</html>
