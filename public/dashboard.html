<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAY Dashboard</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

/* CARD */
.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* SALDO */
.saldo{
  font-size:25px;
  font-weight:bold;
  color:#22c55e;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#2563eb);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* API */
.api-box{
  display:flex;
  gap:10px;
}
.api-box input{
  flex:1;
  background:#020617;
  color:#22c55e;
}

/* QR */
.qr{
  text-align:center;
  margin-top:15px;
}
.qr img{
  width:200px;
  border-radius:10px;
}

/* LOADING */
.loading{
  display:none;
  text-align:center;
}
.spinner{
  border:3px solid rgba(255,255,255,0.2);
  border-top:3px solid #3b82f6;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* NOTIF */
.notif{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  display:none;
}
.success{ background:#16a34a; }
.error{ background:#dc2626; }

/* LOGOUT */
.logout{
  background:#ef4444;
}
</style>
</head>

<body>

<div class="header">
  💎 VINN PAY
  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- SALDO -->
<div class="card">
  <div>Saldo Anda</div>
  <div class="saldo" id="saldo">Rp0</div>
</div>

<!-- API KEY -->
<div class="card">
  <h3>🔑 API KEY</h3>
  <div class="api-box">
    <input id="apikey" readonly>
    <button onclick="copyKey()">📋</button>
  </div>
  <button onclick="regenKey()">🔄 Regenerate</button>
</div>

<!-- DEPOSIT -->
<div class="card">
  <h3>💳 Deposit</h3>
  <input id="amount" placeholder="Masukkan nominal">

  <button onclick="createDeposit()">Deposit</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Memproses pembayaran...</p>
  </div>

  <div class="qr" id="qr"></div>
  <div id="notif" class="notif"></div>
</div>

<script>
const notif = document.getElementById("notif");

// LOAD USER
async function loadUser(){
  const token = localStorage.getItem("token");

  const res = await fetch("/api/user/me",{
    headers:{ authorization:token }
  });

  const data = await res.json();

  if(data.success){
    document.getElementById("saldo").innerText =
      "Rp"+data.data.saldo.toLocaleString("id-ID");

    document.getElementById("apikey").value = data.data.apiKey;
  }
}

// COPY
function copyKey(){
  navigator.clipboard.writeText(document.getElementById("apikey").value);
  notif.innerText="✅ API Key disalin";
  notif.className="notif success";
  notif.style.display="block";
}

// LOGOUT
function logout(){
  localStorage.removeItem("token");
  location.href="/";
}

// REGENERATE
async function regenKey(){
  const token = localStorage.getItem("token");

  const res = await fetch("/api/user/regen",{
    method:"POST",
    headers:{ authorization:token }
  });

  const data = await res.json();

  if(data.success){
    document.getElementById("apikey").value = data.apiKey;
    notif.innerText="✅ API Key baru dibuat";
    notif.className="notif success";
    notif.style.display="block";
  }
}

// CREATE DEPOSIT
async function createDeposit(){
  const amount = document.getElementById("amount").value;
  const token = localStorage.getItem("token");

  document.getElementById("loading").style.display="block";
  document.getElementById("qr").innerHTML="";

  const res = await fetch("/api/deposit/create",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      authorization:token
    },
    body:JSON.stringify({ amount })
  });

  const data = await res.json();

  document.getElementById("loading").style.display="none";

  if(data.success){
    document.getElementById("qr").innerHTML = `
      <p>Scan QRIS:</p>
      <img src="${data.data.qrImage}">
      <p>Rp${data.data.totalAmount}</p>
    `;

    cekStatus(data.data.depositId);
  }else{
    notif.innerText="❌ Gagal deposit";
    notif.className="notif error";
    notif.style.display="block";
  }
}

// CEK STATUS
function cekStatus(id){
  const interval = setInterval(async ()=>{
    const res = await fetch(`/api/deposit/status?depositId=${id}`);
    const data = await res.json();

    if(data.status === "success"){
      clearInterval(interval);

      notif.innerText="✅ Pembayaran berhasil!";
      notif.className="notif success";
      notif.style.display="block";

      loadUser();
    }
  },5000);
}

// INIT
loadUser();
</script>

</body>
