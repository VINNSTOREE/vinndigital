<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard VINN PAY</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

/* CARD SALDO */
.card{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,0,0,0.7);
}

.saldo{
  font-size:28px;
  font-weight:bold;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#2563eb);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* LOADING */
.loading{
  display:none;
  text-align:center;
  margin-top:20px;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* QR */
.qr{
  display:none;
  text-align:center;
  margin-top:20px;
}

.qr img{
  width:200px;
  border-radius:20px;
  box-shadow:0 0 20px #3b82f6;
  animation:fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

/* STATUS */
.status{
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">💎 VINN PAY DASHBOARD</div>

<div class="card">
  <div>Email: <span id="email"></span></div>
  <div class="saldo">Rp <span id="saldo">0</span></div>
</div>

<div class="card">
  <h3>💳 Deposit Saldo</h3>
  <input id="amount" placeholder="Masukkan nominal">

  <button onclick="deposit()">🚀 Deposit Sekarang</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Memproses pembayaran...</p>
  </div>

  <div class="qr" id="qrBox">
    <img id="qrImg">
    <div class="status" id="status">Menunggu pembayaran...</div>
  </div>
</div>

<script>
const token = localStorage.getItem("token");

// LOAD USER
async function loadUser(){
  const res = await fetch("/api/user", {
    headers:{ authorization: token }
  });
  const data = await res.json();

  document.getElementById("email").innerText = data.email;
  document.getElementById("saldo").innerText = data.saldo.toLocaleString("id-ID");
}
loadUser();

// DEPOSIT
async function deposit(){
  const amount = document.getElementById("amount").value;

  document.getElementById("loading").style.display="block";
  document.getElementById("qrBox").style.display="none";

  const res = await fetch("/api/deposit/create", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ amount })
  });

  const data = await res.json();

  // delay biar animasi hidup
  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    document.getElementById("qrBox").style.display="block";

    document.getElementById("qrImg").src = data.data.qrImage;
  },2000);

  // CEK STATUS
  const id = data.data.depositId;

  const interval = setInterval(async()=>{
    const cek = await fetch("/api/deposit/status?id="+id);
    const resCek = await cek.json();

    if(resCek.data.status === "success"){
      document.getElementById("status").innerText = "✅ Pembayaran berhasil!";
      clearInterval(interval);

      // refresh saldo
      loadUser();
    }
  },5000);
}
</script>

</body>
</html>
