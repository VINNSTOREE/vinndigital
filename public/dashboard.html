<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAY</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
.header{
  padding:20px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout-btn{
  background:red;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* CARD */
.card{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,0,0,0.7);
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.saldo{
  font-size:28px;
  font-weight:bold;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#2563eb);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* LOADING */
.loading{
  display:none;
  text-align:center;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* QR */
.qr{
  display:none;
  text-align:center;
}

.qr img{
  width:200px;
  border-radius:20px;
  box-shadow:0 0 20px #3b82f6;
  animation:zoomIn 0.5s ease;
}

@keyframes zoomIn{
  from{opacity:0; transform:scale(0.7);}
  to{opacity:1; transform:scale(1);}
}

/* MODAL LOGOUT */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-content{
  background:#0f172a;
  padding:25px;
  border-radius:15px;
  text-align:center;
  animation:scaleIn 0.3s ease;
}

@keyframes scaleIn{
  from{transform:scale(0.7);}
  to{transform:scale(1);}
}

.modal button{
  width:auto;
  margin:5px;
}
</style>
</head>

<body>

<div class="header">
  💎 VINN PAY
  <button class="logout-btn" onclick="openLogout()">Logout</button>
</div>

<div class="card">
  <div>Email: <span id="email"></span></div>
  <div class="saldo">Rp <span id="saldo">0</span></div>
</div>

<div class="card">
  <h3>🔑 API KEY</h3>
  <p id="apikey"></p>
  <p>Request: <span id="req"></span></p>
  <p>Last Used: <span id="last"></span></p>

  <button onclick="copyKey()">📋 Copy API Key</button>
  <button onclick="regenKey()">🔄 Regenerate</button>
</div>

<div class="card">
  <h3>💳 Deposit</h3>
  <input id="amount" placeholder="Nominal">

  <button onclick="deposit()">🚀 Deposit</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Memproses pembayaran...</p>
  </div>

  <div class="qr" id="qrBox">
    <img id="qrImg">
    <p id="status">Menunggu pembayaran...</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="logoutModal">
  <div class="modal-content">
    <h3>Keluar Akun?</h3>
    <p>Yakin mau logout?</p>
    <button onclick="confirmLogout()">Ya</button>
    <button onclick="closeLogout()">Batal</button>
  </div>
</div>

<script>
const token = localStorage.getItem("token");

// PROTEKSI
if(!token){
  location.href="/";
}

// LOAD USER
async function loadUser(){
  const res = await fetch("/api/user",{headers:{authorization:token}});
  const data = await res.json();

  email.innerText=data.email;
  saldo.innerText=data.saldo.toLocaleString("id-ID");
  apikey.innerText=data.apiKey;
  req.innerText=data.requestCount||0;
  last.innerText=data.lastUsed||"-";
}
loadUser();

// COPY
function copyKey(){
  navigator.clipboard.writeText(apikey.innerText);
  alert("API Key disalin!");
}

// REGEN
async function regenKey(){
  await fetch("/api/user/regen",{method:"POST",headers:{authorization:token}});
  loadUser();
}

// DEPOSIT
async function deposit(){
  const amount=amountInput.value;

  loading.style.display="block";
  qrBox.style.display="none";

  const res=await fetch("/api/deposit/create",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      authorization:token
    },
    body:JSON.stringify({amount})
  });

  const data=await res.json();

  setTimeout(()=>{
    loading.style.display="none";
    qrBox.style.display="block";
    qrImg.src=data.data.qrImage;
  },2000);

  const id=data.data.depositId;

  const interval=setInterval(async()=>{
    const cek=await fetch("/api/deposit/status?id="+id);
    const resCek=await cek.json();

    if(resCek.data.status==="success"){
      status.innerText="✅ Berhasil!";
      clearInterval(interval);
      loadUser();
    }
  },5000);
}

// LOGOUT MODAL
function openLogout(){
  logoutModal.classList.add("show");
}

function closeLogout(){
  logoutModal.classList.remove("show");
}

function confirmLogout(){
  document.body.style.opacity="0";
  setTimeout(()=>{
    localStorage.removeItem("token");
    location.href="/";
  },500);
}
</script>

</body>
</html>
