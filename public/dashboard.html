<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN GATEWAY🌟</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#0f172a;
  padding:20px;
  position:fixed;
}

.logo{
  font-size:20px;
  font-weight:bold;
  margin-bottom:30px;
}

.menu button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111c33;
  color:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover{
  background:#1d2a4a;
}

/* MAIN */
.main{
  margin-left:260px;
  width:100%;
  padding:20px;
}

/* CARD */
.card{
  background:#111c33;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* SALDO */
.saldo{
  font-size:28px;
  font-weight:bold;
  color:#22c55e;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#0b1220;
  color:white;
}

/* BUTTON */
button{
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  width:100%;
}

button:hover{
  background:#1d4ed8;
}

/* API */
.api{
  display:flex;
  gap:10px;
}
.api input{
  flex:1;
}

/* NOTIF */
.notif{
  display:none;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}
.success{background:#16a34a;}
.error{background:#dc2626;}

/* QR */
.qr{
  text-align:center;
  margin-top:15px;
}
.qr img{
  width:200px;
  border-radius:10px;
}

/* LOADING */
.loading{
  display:none;
  margin-top:10px;
  text-align:center;
}
.spinner{
  width:25px;
  height:25px;
  border:3px solid #333;
  border-top:3px solid #2563eb;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">💎 VINN PAY</div>

  <div class="menu">
    <button onclick="scrollToTop()">🏠 Dashboard</button>
    <button onclick="scrollDeposit()">💳 Deposit</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SALDO -->
  <div class="card">
    <div>Saldo Anda</div>
    <div class="saldo" id="saldo">Rp0</div>
  </div>

  <!-- API KEY -->
  <div class="card">
    <h3>🔑 API KEY</h3>
    <div class="api">
      <input id="apikey" readonly placeholder="Loading...">
      <button onclick="copyKey()">📋</button>
    </div>
    <button onclick="regenKey()">🔄 Regenerate</button>
  </div>

  <!-- DEPOSIT -->
  <div class="card" id="depositCard">
    <h3>💳 Deposit QRIS</h3>
    <input id="amount" placeholder="Masukkan nominal">

    <button onclick="createDeposit()">Buat Deposit</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Memproses QRIS...</p>
    </div>

    <div class="qr" id="qr"></div>
    <div class="notif" id="notif"></div>
  </div>

</div>

<script>
const notif = document.getElementById("notif");

/* LOAD USER */
async function loadUser(){
  try{
    const token = localStorage.getItem("token");
    if(!token) return location.href="/";

    const res = await fetch("/api/user/me",{
      headers:{ authorization: token }
    });

    const data = await res.json();
    if(!data.success) return;

    document.getElementById("saldo").innerText =
      "Rp"+Number(data.data.saldo||0).toLocaleString("id-ID");

    document.getElementById("apikey").value =
      data.data.apiKey || "-";

  }catch(e){
    console.log(e);
  }
}

/* COPY API */
function copyKey(){
  navigator.clipboard.writeText(document.getElementById("apikey").value);
  showNotif("API KEY disalin", true);
}

/* REGEN */
async function regenKey(){
  const token = localStorage.getItem("token");

  const res = await fetch("/api/user/regen",{
    method:"POST",
    headers:{ authorization:token }
  });

  const data = await res.json();

  if(data.success){
    document.getElementById("apikey").value = data.apiKey;
    showNotif("API KEY baru dibuat", true);
  }else{
    showNotif("Gagal regenerate", false);
  }
}

/* DEPOSIT */
async function createDeposit(){
  const amount = document.getElementById("amount").value;
  const token = localStorage.getItem("token");

  document.getElementById("loading").style.display="block";
  document.getElementById("qr").innerHTML="";

  const res = await fetch("/api/deposit/create",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      authorization:token
    },
    body:JSON.stringify({ amount })
  });

  const data = await res.json();

  document.getElementById("loading").style.display="none";

  if(data.success){
    document.getElementById("qr").innerHTML=`
      <p>Scan QRIS</p>
      <img src="${data.data.qrImage}">
      <p>Rp${data.data.totalAmount}</p>
    `;

    cekStatus(data.data.depositId);
  }else{
    showNotif("Deposit gagal", false);
  }
}

/* CEK STATUS */
function cekStatus(id){
  const interval = setInterval(async ()=>{
    const res = await fetch(`/api/deposit/status?depositId=${id}`);
    const data = await res.json();

    if(data.status==="success"){
      clearInterval(interval);
      showNotif("Pembayaran berhasil!", true);
      loadUser();
    }
  },5000);
}

/* NOTIF */
function showNotif(msg, ok){
  notif.innerText = msg;
  notif.className = "notif " + (ok ? "success":"error");
  notif.style.display="block";
}

/* NAV */
function logout(){
  localStorage.removeItem("token");
  location.href="/";
}
function scrollDeposit(){
  document.getElementById("depositCard").scrollIntoView({behavior:"smooth"});
}
function scrollToTop(){
  window.scrollTo({top:0,behavior:"smooth"});
}

loadUser();
</script>

</body>
</html>
